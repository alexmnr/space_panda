/**/controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    space_panda_controller:
      type: space_panda_controller/SpacePandaController

/**/space_panda_controller:
  ros__parameters:
    friction_compensation: false
    command_force_limit: 100.0
    command_torque_limit: 5.0
    joints:
      - $(var tf_prefix)joint_1
      - $(var tf_prefix)joint_2
      - $(var tf_prefix)joint_3
      - $(var tf_prefix)joint_4
      - $(var tf_prefix)joint_5
      - $(var tf_prefix)joint_6
      - $(var tf_prefix)joint_7
