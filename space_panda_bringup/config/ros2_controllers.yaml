/**/controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    franka_robot_state_broadcaster:
      type: franka_robot_state_broadcaster/FrankaRobotStateBroadcaster

    space_panda_controller:
      type: space_panda_controller/SpacePandaController

/**/space_panda_controller:
  ros__parameters:
    move_group: $(var tf_prefix)manipulator
    tip_link: $(var tf_prefix)ft_frame
    joints:
      - $(var tf_prefix)joint_1
      - $(var tf_prefix)joint_2
      - $(var tf_prefix)joint_3
      - $(var tf_prefix)joint_4
      - $(var tf_prefix)joint_5
      - $(var tf_prefix)joint_6
      - $(var tf_prefix)joint_7

/**/franka_robot_state_broadcaster:
  ros__parameters:
    arm_id: panda

/**/joint_trajectory_controller:
  ros__parameters:
    joints:
      - $(var tf_prefix)joint_1
      - $(var tf_prefix)joint_2
      - $(var tf_prefix)joint_3
      - $(var tf_prefix)joint_4
      - $(var tf_prefix)joint_5
      - $(var tf_prefix)joint_6
      - $(var tf_prefix)joint_7
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    gains:
      # $(var tf_prefix)joint_1: { p: 600., d: 30., i: 0., i_clamp: 1. }
      # $(var tf_prefix)joint_2: { p: 600., d: 30., i: 0., i_clamp: 1. }
      # $(var tf_prefix)joint_3: { p: 600., d: 30., i: 0., i_clamp: 1. }
      # $(var tf_prefix)joint_4: { p: 600., d: 30., i: 0., i_clamp: 1. }
      # $(var tf_prefix)joint_5: { p: 250., d: 10., i: 0., i_clamp: 1. }
      # $(var tf_prefix)joint_6: { p: 150., d: 10., i: 0., i_clamp: 1. }
      # $(var tf_prefix)joint_7: { p:  50., d:  5., i: 0., i_clamp: 1. }
      $(var tf_prefix)joint_1: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
      $(var tf_prefix)joint_2: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
      $(var tf_prefix)joint_3: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
      $(var tf_prefix)joint_4: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
      $(var tf_prefix)joint_5: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
      $(var tf_prefix)joint_6: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
      $(var tf_prefix)joint_7: { ff_velocity_scale: 1.0, p: 0.0, d: 0.0, i: 0.0, antiwindup_strategy: "none" }
